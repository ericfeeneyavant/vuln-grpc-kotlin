name: Scheduled StackHawk Scan

on:
  schedule:
    - cron: "0 0 * * *"  # This runs the scan every day at midnight UTC
  workflow_dispatch:  # This allows manual triggering

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up StackHawk CLI
      run: |
        curl -sL https://cli.stackhawk.com/install.sh | sh
        echo "$HOME/.hawk" >> $GITHUB_PATH
        export PATH=$HOME/.hawk:$PATH
        hawk version  # Verify the installation

    - name: Start Application
      run: |
        docker-compose up -d  # Ensure your application is running

    - name: Run StackHawk Scan
      run: hawk scan
      env:
        HAWK_API_KEY: ${{ secrets.HAWK_API_KEY }}
