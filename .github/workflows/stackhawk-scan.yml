name: Scheduled StackHawk Scan

on:
  schedule:
    - cron: "0 0 * * *"  # This runs the scan every day at midnight UTC
  workflow_dispatch:  # This allows manual triggering

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Check Network and Install StackHawk CLI
      run: |
        set -x
        mkdir -p $HOME/stackhawk
        curl -sL https://cli.stackhawk.com/install.sh -o $HOME/stackhawk/install.sh
        ls -al $HOME/stackhawk
        cat $HOME/stackhawk/install.sh  # Display the install script for debugging
        echo "Checking connectivity to cli.stackhawk.com"
        curl -I https://cli.stackhawk.com/install.sh
        if [ $? -ne 0 ]; then
          echo "Failed to reach cli.stackhawk.com"
          exit 1
        fi
        sh $HOME/stackhawk/install.sh || { echo "Install script failed"; exit 1; }
        ls -al $HOME/.hawk || echo "Directory $HOME/.hawk does not exist"
        if [ -d "$HOME/.hawk" ]; then
          echo "$HOME/.hawk" >> $GITHUB_PATH
          echo "export PATH=\$PATH:$HOME/.hawk" >> $HOME/.bashrc
          source $HOME/.bashrc
          export PATH=$HOME/.hawk:$PATH
          echo "Hawk CLI installed in: $HOME/.hawk"
          echo "Current PATH: $PATH"
          ls -al $HOME/.hawk
          hawk version  # Verify the installation
        else
          echo "StackHawk CLI installation failed"
          exit 1
        fi

    - name: Start Application
      run: |
        # Command to start your application, e.g.,
        docker-compose up -d  # Ensure your application is running
      env:
        HAWK_API_KEY: ${{ secrets.HAWK_API_KEY }}

    - name: Run StackHawk Scan
      run: hawk scan
      env:
        HAWK_API_KEY: ${{ secrets.HAWK_API_KEY }}

