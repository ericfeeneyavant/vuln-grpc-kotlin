name: Scheduled StackHawk Scan

on:
  schedule:
    - cron: "0 0 * * *"  # This runs the scan every day at midnight UTC
  workflow_dispatch:  # This allows manual triggering

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Network Diagnostics and Install StackHawk CLI
      run: |
        set -x
        echo "Checking DNS resolution for various hosts"
        nslookup google.com
        nslookup github.com
        nslookup cli.stackhawk.com || echo "DNS resolution for cli.stackhawk.com failed, retrying..."
        for i in {1..5}; do
          sleep 5
          nslookup cli.stackhawk.com && break
          echo "Retry $i: DNS resolution for cli.stackhawk.com failed, retrying..."
        done
        nslookup cli.stackhawk.com || { echo "Failed to resolve cli.stackhawk.com"; exit 1; }
        echo "Checking connectivity to cli.stackhawk.com"
        curl -I https://cli.stackhawk.com/install.sh || { echo "Failed to reach cli.stackhawk.com"; exit 1; }
        mkdir -p $HOME/stackhawk
        echo "Fetching the install script"
        curl -sL https://cli.stackhawk.com/install.sh -o $HOME/stackhawk/install.sh || { echo "Failed to download the install script"; exit 1; }
        ls -al $HOME/stackhawk
        cat $HOME/stackhawk/install.sh  # Display the install script for debugging
        echo "Running the install script"
        sh $HOME/stackhawk/install.sh || { echo "Install script failed"; exit 1; }
        ls -al $HOME/.hawk || echo "Directory $HOME/.hawk does not exist"
        if [ -d "$HOME/.hawk" ]; then
          echo "$HOME/.hawk" >> $GITHUB_PATH
          echo "export PATH=\$PATH:$HOME/.hawk" >> $HOME/.bashrc
          source $HOME/.bashrc
          export PATH=$HOME/.hawk:$PATH
          echo "Hawk CLI installed in: $HOME/.hawk"
          echo "Current PATH: $PATH"
          ls -al $HOME/.hawk
          hawk version  # Verify the installation
        else
          echo "StackHawk CLI installation failed"
          exit 1
        fi

    - name: Start Application
      run: |
        # Command to start your application, e.g.,
        docker-compose up -d  # Ensure your application is running
      env:
        HAWK_API_KEY: ${{ secrets.HAWK_API_KEY }}

    - name: Run StackHawk Scan
      run: hawk scan
      env:
        HAWK_API_KEY: ${{ secrets.HAWK_API_KEY }}
